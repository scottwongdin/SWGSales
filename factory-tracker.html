<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SWG Factory</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --surface2: #1e2026;
    --border: #2a2d35;
    --accent: #d4f54a;
    --accent2: #4af5a0;
    --danger: #f54a4a;
    --text: #f0f0ee;
    --muted: #6b6f7a;
    --muted2: #4a4d57;
    --line1: #3af0b0;
    --line2: #f5c842;
    --line3: #c084fc;
    --line4: #60a5fa;
    --line5: #fb923c;
    --radius: 10px;
    --mono: 'DM Mono', monospace;
    --display: 'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    min-height: 100vh;
  }

  /* grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 2.5rem; gap: 1rem; flex-wrap: wrap; }
  .logo {
    font-family: var(--display);
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
    line-height: 1;
  }
  .logo span { color: var(--accent); }
  .header-sub { font-size: 12px; color: var(--muted); margin-top: 4px; letter-spacing: 0.05em; text-transform: uppercase; }
  .tab-bar { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; }
  .tab { padding: 6px 14px; border-radius: 7px; border: none; background: none; color: var(--muted); font-family: var(--mono); font-size: 13px; cursor: pointer; transition: all 0.15s; }
  .tab.active { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .tab:hover:not(.active) { color: var(--text); }

  /* panels */
  .panel { display: none; }
  .panel.active { display: block; }

  /* line cards */
  .lines-grid { display: grid; gap: 1rem; }
  .line-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .line-card.running { border-color: var(--accent); }
  .line-card.done { border-color: var(--accent2); }
  .line-header {
    display: flex; align-items: center; gap: 10px;
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .drag-handle {
    cursor: grab; color: var(--muted2); font-size: 14px; line-height: 1;
    padding: 2px 2px; flex-shrink: 0; user-select: none;
    display: flex; flex-direction: column; gap: 3px;
  }
  .drag-handle span { display: block; width: 14px; height: 1.5px; background: currentColor; border-radius: 1px; }
  .drag-handle:active { cursor: grabbing; }
  .line-card.dragging { opacity: 0.4; }
  .line-card.drag-over { border-color: var(--accent); border-style: dashed; }
  .line-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .line-name-input {
    background: none; border: none; color: var(--text);
    font-family: var(--display); font-weight: 600; font-size: 15px;
    flex: 1; outline: none; min-width: 0;
  }
  .line-name-input:focus { border-bottom: 1px solid var(--accent); }
  .line-status { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); padding: 3px 8px; border-radius: 4px; background: var(--surface); border: 1px solid var(--border); }
  .line-status.running { color: var(--accent); border-color: var(--accent); background: rgba(212,245,74,0.07); }
  .line-status.done { color: var(--accent2); border-color: var(--accent2); background: rgba(74,245,160,0.07); }
  .line-body { padding: 1rem; }

  /* run form */
  .run-form { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; gap: 12px; align-items: end; margin-bottom: 0.75rem; }
  .field label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; }
  input[type=text], input[type=number], select {
    width: 100%; padding: 7px 10px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-family: var(--mono); font-size: 13px;
    outline: none; transition: border-color 0.15s;
  }
  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--surface); }

  .btn { padding: 7px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-family: var(--mono); font-size: 13px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn:active { transform: scale(0.97); }
  .btn-accent { background: var(--accent); color: #0e0f11; border-color: var(--accent); font-weight: 500; }
  .btn-accent:hover { background: #c4e540; border-color: #c4e540; color: #0e0f11; }
  .btn-danger { border-color: var(--muted2); color: var(--muted); }
  .btn-danger:hover { border-color: var(--danger); color: var(--danger); }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn:disabled:hover { border-color: var(--border); color: var(--text); }

  /* metrics row */
  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 0.75rem; }
  .metric { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; }
  .metric-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); margin-bottom: 3px; }
  .metric-val { font-family: var(--display); font-size: 18px; font-weight: 700; color: var(--text); }
  .metric-val.accent { color: var(--accent); }

  /* progress */
  .prog-wrap { margin-bottom: 0.75rem; }
  .prog-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
  .prog-bg { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width 1s linear; }
  .prog-fill.done { background: var(--accent2); }

  /* line actions */
  .line-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .done-banner { display: none; font-size: 13px; color: var(--accent2); border: 1px solid var(--accent2); background: rgba(74,245,160,0.07); border-radius: 6px; padding: 7px 12px; margin-bottom: 0.75rem; }

  /* add line btn */
  .add-line-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 0.9rem;
    border: 1px dashed var(--border); border-radius: var(--radius);
    background: none; color: var(--muted); font-family: var(--mono); font-size: 13px;
    cursor: pointer; transition: all 0.15s;
  }
  .add-line-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* history */
  .history-empty { text-align: center; padding: 3rem; color: var(--muted); font-size: 13px; }
  .history-list { display: grid; gap: 1rem; }
  .history-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
  }
  .history-card-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.75rem 1rem; background: var(--surface2); border-bottom: 1px solid var(--border);
    flex-wrap: wrap; gap: 8px;
  }
  .history-name { font-family: var(--display); font-size: 14px; font-weight: 600; }
  .history-date { font-size: 11px; color: var(--muted); }
  .history-body { padding: 0.75rem 1rem; }
  .history-jobs { font-size: 12px; color: var(--muted); }
  .history-jobs span { color: var(--text); }
  .history-meta { display: flex; gap: 1.5rem; font-size: 12px; color: var(--muted); margin-top: 6px; }
  .history-meta strong { color: var(--accent); font-weight: 500; }
  .history-actions { display: flex; gap: 6px; }

  /* toast */
  #toast {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
    background: var(--surface2); border: 1px solid var(--accent); color: var(--accent);
    padding: 10px 20px; border-radius: var(--radius); font-size: 13px;
    opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 999;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; }

  @media (max-width: 700px) {
    .run-form { grid-template-columns: 1fr 1fr; }
    .metrics { grid-template-columns: 1fr 1fr; }
    .tab { padding: 6px 10px; font-size: 12px; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <div class="logo">SWG <span>Factory</span></div>
      <div class="header-sub">Production line tracker</div>
    </div>
    <div class="tab-bar">
      <button class="tab active" onclick="switchTab('lines')">Lines</button>
      <button class="tab" onclick="switchTab('history')">History</button>
    </div>
  </header>

  <!-- LINES PANEL -->
  <div id="panel-lines" class="panel active">
    <div class="lines-grid" id="lines-grid"></div>
    <button class="add-line-btn" style="margin-top:1rem;" onclick="addLine()">+ Add production line</button>
  </div>

  <!-- HISTORY PANEL -->
  <div id="panel-history" class="panel">
    <div id="history-container"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const LINE_COLORS = ['var(--line1)','var(--line2)','var(--line3)','var(--line4)','var(--line5)'];
const API = 'http://localhost:5050/api';

let state = { lines: [], history: [] };
let timers = {};

async function loadState() {
  try {
    const [linesRes, histRes] = await Promise.all([
      fetch(`${API}/lines`),
      fetch(`${API}/history`)
    ]);
    const lines = await linesRes.json();
    const history = await histRes.json();
    // Map DB field names back to JS field names
    state.lines = lines.map(l => ({
      id: l.id,
      name: l.name,
      colorIdx: l.color_idx,
      product: l.product || '',
      tpu: l.tpu,
      unit: l.unit || 'sec',
      qty: l.qty,
      status: l.status || 'idle',
      startedAt: l.started_at,
      totalSec: l.total_sec || 0
    }));
    state.history = history.map(h => ({
      id: h.id,
      product: h.product || '',
      tpu: h.tpu,
      unit: h.unit || 'sec',
      qty: h.qty,
      createdAt: h.created_at
    }));
  } catch(e) {
    console.error('Failed to load state from API:', e);
    toast('⚠ Could not connect to Factory API. Is factory_api.py running?');
    state = { lines: [], history: [] };
  }
}

async function saveState() {
  try {
    await Promise.all([
      fetch(`${API}/lines`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(state.lines)
      }),
      fetch(`${API}/history`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(state.history)
      })
    ]);
  } catch(e) {
    console.error('Failed to save state to API:', e);
  }
}

function fmtDur(secs) {
  secs = Math.round(secs);
  if (secs < 60) return secs + 's';
  if (secs < 3600) { const m=Math.floor(secs/60),s=secs%60; return s?m+'m '+s+'s':m+'m'; }
  const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60);
  return m?h+'h '+m+'m':h+'h';
}
function toSec(v, u) { return u==='sec'?v:u==='min'?v*60:v*3600; }
function fmtTime(ts) { return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
function fmtDate(ts) { return new Date(ts).toLocaleDateString([],{month:'short',day:'numeric',year:'numeric'}); }
function uid() { return Math.random().toString(36).slice(2,9); }

function addLine() {
  const idx = state.lines.length;
  state.lines.push({
    id: uid(),
    name: 'Factory ' + (idx+1),
    colorIdx: idx % LINE_COLORS.length,
    tpu: '', unit: 'sec', qty: '', product: '',
    status: 'idle',
    startedAt: null,
    totalSec: 0
  });
  saveState();
  renderLines();
}

function removeLine(id) {
  if (timers[id]) { clearInterval(timers[id]); delete timers[id]; }
  state.lines = state.lines.filter(l => l.id !== id);
  saveState();
  renderLines();
}

function renameLine(id, name) {
  const line = state.lines.find(l=>l.id===id);
  if (line) { line.name = name.trim() || line.name; saveState(); }
}

function startLine(id) {
  const line = state.lines.find(l=>l.id===id);
  const tpu = parseFloat(document.getElementById('tpu-'+id).value);
  const unit = document.getElementById('unit-'+id).value;
  const qty = parseInt(document.getElementById('qty-'+id).value);
  const product = document.getElementById('product-'+id).value.trim();
  const err = document.getElementById('err-'+id);
  if (!tpu||tpu<=0) { err.textContent='Enter a valid time per unit'; return; }
  if (!qty||qty<1) { err.textContent='Enter a valid quantity'; return; }
  err.textContent='';
  line.tpu = tpu; line.unit = unit; line.qty = qty; line.product = product;
  line.totalSec = toSec(tpu, unit) * qty;
  line.status = 'running';
  line.startedAt = Date.now();
  saveRunToHistory(line);
  saveState();
  renderLines();
  timers[id] = setInterval(()=>tickLine(id), 1000);
}

function tickLine(id) {
  const line = state.lines.find(l=>l.id===id);
  if (!line) { clearInterval(timers[id]); return; }
  const elapsed = (Date.now() - line.startedAt) / 1000;
  if (elapsed >= line.totalSec) {
    line.status = 'done';
    clearInterval(timers[id]);
    delete timers[id];
    saveState();
    toast('✓ ' + line.name + ' complete!', id);
  }
  renderLineCard(id);
}

function resetLine(id) {
  const line = state.lines.find(l=>l.id===id);
  if (!line) return;
  if (timers[id]) { clearInterval(timers[id]); delete timers[id]; }
  line.status = 'idle'; line.startedAt = null;
  saveState();
  renderLines();
}

function saveRunToHistory(line) {
  const exists = state.history.some(h => h.product === (line.product || ''));
  if (exists) return;
  state.history.unshift({
    id: uid(),
    product: line.product || '',
    tpu: line.tpu,
    unit: line.unit,
    qty: line.qty
  });
  if (state.history.length > 50) state.history = state.history.slice(0,50);
  saveState();
}

function resubmitRun(histId) {
  const h = state.history.find(x=>x.id===histId);
  if (!h) return;
  const idx = state.lines.length;
  state.lines.push({
    id: uid(),
    name: 'Factory ' + (idx+1),
    colorIdx: idx % LINE_COLORS.length,
    tpu: h.tpu, unit: h.unit, qty: h.qty, product: h.product || '',
    status: 'idle',
    startedAt: null,
    totalSec: 0
  });
  saveState();
  switchTab('lines');
  renderLines();
}

function deleteHistory(id) {
  state.history = state.history.filter(h=>h.id!==id);
  saveState();
  renderHistory();
}

function resumeTimers() {
  state.lines.forEach(line => {
    if (line.status === 'running') {
      const elapsed = (Date.now() - line.startedAt) / 1000;
      if (elapsed >= line.totalSec) {
        line.status = 'done';
      } else {
        timers[line.id] = setInterval(()=>tickLine(line.id), 1000);
      }
    }
  });
  saveState();
}

function renderLineCard(id) {
  const el = document.getElementById('line-'+id);
  if (!el) return;
  const line = state.lines.find(l=>l.id===id);
  if (!line) return;

  const elapsed = line.startedAt ? Math.min((Date.now()-line.startedAt)/1000, line.totalSec) : 0;
  const remaining = Math.max(0, line.totalSec - elapsed);
  const pct = line.totalSec > 0 ? Math.min(100, (elapsed/line.totalSec)*100) : 0;
  const eta = line.startedAt ? fmtTime(line.startedAt + line.totalSec*1000) : '—';

  el.className = 'line-card' + (line.status==='running'?' running':line.status==='done'?' done':'');
  el.querySelector('.line-status').textContent = line.status;
  el.querySelector('.line-status').className = 'line-status ' + (line.status!=='idle'?line.status:'');
  el.querySelector('.m-total').textContent = line.totalSec > 0 ? fmtDur(line.totalSec) : '—';
  el.querySelector('.m-eta').textContent = eta;
  el.querySelector('.m-remaining').textContent = line.status==='done'?'Done':line.status==='running'?fmtDur(remaining):'—';

  const prog = el.querySelector('.prog-wrap');
  if (line.status !== 'idle') {
    prog.style.display = 'block';
    el.querySelector('.prog-fill').style.width = pct.toFixed(1)+'%';
    el.querySelector('.prog-fill').className = 'prog-fill'+(line.status==='done'?' done':'');
    el.querySelector('.prog-pct').textContent = Math.round(pct)+'%';
    el.querySelector('.prog-elapsed').textContent = 'Elapsed: '+fmtDur(elapsed);
    el.querySelector('.prog-remain').textContent = line.status==='done'?'Complete':'Remaining: '+fmtDur(remaining);
  } else {
    prog.style.display = 'none';
  }

  const startBtn = el.querySelector('.start-btn');
  if (startBtn) {
    startBtn.disabled = line.status !== 'idle';
    startBtn.textContent = line.status==='done' ? 'Done' : 'Start';
  }
}

function buildHistoryOptions() {
  if (state.history.length === 0) return '';
  const opts = sortedHistory().map(h =>
    `<option value="${h.id}">${h.product || '(no product)'}</option>`
  ).join('');
  return `<div style="margin-bottom:0.75rem;">
    <div class="field">
      <label>Load from history</label>
      <div style="display:flex;gap:8px;">
        <select class="history-picker" style="flex:1;"><option value="">— select a previous run —</option>${opts}</select>
        <button class="btn btn-sm load-history-btn" style="white-space:nowrap;">Load</button>
      </div>
    </div>
  </div>`;
}

function buildLineHTML(line) {
  const color = LINE_COLORS[line.colorIdx % LINE_COLORS.length];
  const ul = u => u==='sec'?'s':u==='min'?'min':'hr';
  return `<div class="line-card" id="line-${line.id}">
    <div class="line-header">
      <div class="drag-handle" title="Drag to reorder"><span></span><span></span><span></span></div>
      <div class="line-dot" style="background:${color}"></div>
      <input class="line-name-input" value="${line.name}" onchange="renameLine('${line.id}',this.value)" />
      <span class="line-status">${line.status}</span>
      <button class="btn btn-sm btn-danger" onclick="removeLine('${line.id}')">Remove</button>
    </div>
    <div class="line-body">
      ${line.status === 'idle' ? buildHistoryOptions() : ''}
      <div class="run-form">
        <div class="field">
          <label>Product</label>
          <input type="text" id="product-${line.id}" placeholder="e.g. Widget A" value="${line.product||''}" ${line.status!=='idle'?'disabled':''} />
        </div>
        <div class="field">
          <label>Time per unit</label>
          <input type="number" id="tpu-${line.id}" placeholder="e.g. 30" value="${line.tpu||''}" min="0.01" step="any" ${line.status!=='idle'?'disabled':''} />
        </div>
        <div class="field">
          <label>Unit</label>
          <select id="unit-${line.id}" ${line.status!=='idle'?'disabled':''}>
            <option value="sec" ${line.unit==='sec'||!line.unit?'selected':''}>Seconds</option>
            <option value="min" ${line.unit==='min'?'selected':''}>Minutes</option>
            <option value="hr" ${line.unit==='hr'?'selected':''}>Hours</option>
          </select>
        </div>
        <div class="field">
          <label>Quantity</label>
          <input type="number" id="qty-${line.id}" placeholder="e.g. 100" value="${line.qty||''}" min="1" step="1" ${line.status!=='idle'?'disabled':''} />
        </div>
      </div>
      <span id="err-${line.id}" style="font-size:12px;color:var(--danger);display:block;margin:-4px 0 8px;"></span>
      <div class="metrics">
        <div class="metric"><div class="metric-label">Run time</div><div class="metric-val m-total">${line.totalSec>0?fmtDur(line.totalSec):'—'}</div></div>
        <div class="metric"><div class="metric-label">Est. done</div><div class="metric-val m-eta" style="font-size:15px;">—</div></div>
        <div class="metric"><div class="metric-label">Remaining</div><div class="metric-val accent m-remaining">—</div></div>
      </div>
      <div class="prog-wrap" style="display:none;">
        <div class="prog-row"><span class="prog-elapsed">Elapsed: 0s</span><span class="prog-pct">0%</span><span class="prog-remain">Remaining: —</span></div>
        <div class="prog-bg"><div class="prog-fill" style="width:0%"></div></div>
      </div>
      <div class="line-actions">
        <button class="btn btn-accent start-btn" onclick="startLine('${line.id}')" ${line.status!=='idle'?'disabled':''}>
          ${line.status==='done'?'Done':'Start'}
        </button>
        <button class="btn" onclick="resetLine('${line.id}')">Reset</button>
      </div>
      <div class="done-banner" ${line.status==='done'?'style="display:block"':''}>${line.status==='done'?'✓ '+line.name+' complete!':''}</div>
    </div>
  </div>`;
}

function renderLines() {
  const grid = document.getElementById('lines-grid');
  if (state.lines.length === 0) {
    grid.innerHTML = '<div style="text-align:center;padding:3rem;color:var(--muted);font-size:13px;">No factories yet.<br>Add one below.</div>';
    return;
  }
  grid.innerHTML = state.lines.map(buildLineHTML).join('');
  state.lines.forEach(line => { renderLineCard(line.id); });
  initDragDrop();
}

let dragSrcId = null;

function initDragDrop() {
  const cards = document.querySelectorAll('.line-card');
  cards.forEach(card => {
    card.setAttribute('draggable', 'true');
    card.addEventListener('dragstart', e => {
      dragSrcId = card.id.replace('line-', '');
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      document.querySelectorAll('.line-card').forEach(c => c.classList.remove('drag-over'));
    });
    card.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      document.querySelectorAll('.line-card').forEach(c => c.classList.remove('drag-over'));
      card.classList.add('drag-over');
    });
    card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
    card.addEventListener('drop', e => {
      e.preventDefault();
      card.classList.remove('drag-over');
      const dropId = card.id.replace('line-', '');
      if (!dragSrcId || dragSrcId === dropId) return;
      const srcIdx = state.lines.findIndex(l => l.id === dragSrcId);
      const dstIdx = state.lines.findIndex(l => l.id === dropId);
      const [moved] = state.lines.splice(srcIdx, 1);
      state.lines.splice(dstIdx, 0, moved);
      saveState();
      renderLines();
    });
  });
}

function sortedHistory() {
  return [...state.history].sort((a, b) => (a.product||'').localeCompare(b.product||''));
}

function renderHistory() {
  const el = document.getElementById('history-container');
  if (state.history.length === 0) {
    el.innerHTML = '<div class="history-empty">No products yet.<br>Start a factory run and it will appear here.</div>';
    return;
  }
  el.innerHTML = '<div class="history-list">' + sortedHistory().map(h => `
    <div class="history-card">
      <div class="history-card-header">
        <div class="history-name">${h.product || '(no product)'}</div>
        <div class="history-actions">
          <button class="btn btn-sm" data-resubmit="${h.id}">Load ↗</button>
          <button class="btn btn-sm btn-danger" data-delete="${h.id}">Delete</button>
        </div>
      </div>
    </div>
  `).join('') + '</div>';
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['lines','history'][i]===name);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  if (name==='history') renderHistory();
}

function toast(msg, lineId) {
  if (lineId) {
    const el = document.getElementById('line-'+lineId);
    if (el) {
      const banner = el.querySelector('.done-banner');
      if (banner) { banner.textContent = msg; banner.style.display = 'block'; }
    }
    return;
  }
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 3000);
}

document.getElementById('lines-grid').addEventListener('click', e => {
  if (e.target.classList.contains('load-history-btn')) {
    const card = e.target.closest('.line-card');
    const lineId = card.id.replace('line-', '');
    const histId = card.querySelector('.history-picker').value;
    if (!histId) return;
    const h = state.history.find(x => x.id === histId);
    if (!h) return;
    document.getElementById('product-'+lineId).value = h.product || '';
    document.getElementById('tpu-'+lineId).value = h.tpu || '';
    document.getElementById('qty-'+lineId).value = h.qty || '';
    document.getElementById('unit-'+lineId).value = h.unit || 'sec';
  }
});

document.getElementById('history-container').addEventListener('click', e => {
  const resubmitId = e.target.dataset.resubmit;
  const deleteId = e.target.dataset.delete;
  if (resubmitId) resubmitRun(resubmitId);
  if (deleteId) deleteHistory(deleteId);
});

async function init() {
  await loadState();
  if (state.lines.length === 0) addLine();
  else { resumeTimers(); renderLines(); }
}

init();
</script>
